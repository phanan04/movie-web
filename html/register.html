<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - NEW MOVIE</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/register.css" />
  </head>
  <body>
    <div class="overlay">
      <header class="register-header">
        <a href="index.html" class="register-logo"> NEW <span>MOVIE</span> </a>
      </header>

      <main>
        <div class="register-container">
          <div class="register-form">
            <h1>Đăng ký</h1>
            <form>
              <input type="text" class="form-control" placeholder="Họ và tên" />
              <input type="email" class="form-control" placeholder="Email" />
              <input
                type="tel"
                class="form-control"
                placeholder="Số điện thoại"
              />
              <input
                type="password"
                class="form-control"
                placeholder="Mật khẩu"
              />
              <input
                type="password"
                class="form-control"
                placeholder="Nhập lại mật khẩu"
              />

              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="terms" />
                <label class="form-check-label" for="terms">
                  Tôi đồng ý với Điều khoản sử dụng và đã đọc Thông báo về Quyền
                  riêng tư của NEW MOVIE.
                </label>
              </div>

              <button type="submit" class="btn btn-register">Đăng ký</button>

              <div class="signin-now">
                Đã có tài khoản?
                <a href="login.html">Đăng nhập ngay</a>
              </div>

              <div class="recaptcha-terms">
                Trang này được Google reCAPTCHA bảo vệ để đảm bảo bạn không phải
                là robot.
                <a href="#">Tìm hiểu thêm</a>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
